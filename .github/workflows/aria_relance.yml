name: ARIA - Relances inscriptions

on:
  schedule:
    - cron: '30 8 * * 2,5,0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulation sans envoi'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  relances:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Appel API ARIA
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY_RUN" = "true" ]; then
            BODY='{"dry_run":true}'
          else
            BODY='{}'
          fi
          HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" --max-time 90 -X POST \
            "${{ secrets.GLOBALO_URL }}/api/cron/aria-relance" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          cat /tmp/resp.json
          echo "HTTP: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "Erreur HTTP $HTTP"
            exit 1
          fi
          echo "ARIA OK"
