<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Globalo">
  <defs>
    <linearGradient id="smileGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f5a623"/>
      <stop offset="50%"  stop-color="#8dc63f"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <!-- Fond avec léger dégradé sombre -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e2d3d"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
  </defs>

  <!-- Fond carré arrondi (safe zone maskable) -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- "G" grande lettre blanche centrée -->
  <text
    x="256" y="315"
    font-family="system-ui,-apple-system,'Segoe UI',Georgia,serif"
    font-size="290"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-8">G</text>

  <!-- Courbe sourire orange → vert (identique au vrai logo) -->
  <path d="M 90 360 Q 256 430 422 360"
        fill="none"
        stroke="url(#smileGrad)"
        stroke-width="28"
        stroke-linecap="round"/>

  <!-- Flèche verte au bout droit de la courbe -->
  <polyline
    points="404,345 424,360 406,376"
    fill="none"
    stroke="#16a34a"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
